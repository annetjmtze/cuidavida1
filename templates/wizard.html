<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Wizard Médico</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
.step { display: none; }
.step.active { display: block; }

.slide-up {
animation: slideUp 0.3s ease-out;
}
@keyframes slideUp {
from { transform: translateY(20px); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
</style>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

<!-- HEADER -->
<div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-4 rounded-t-2xl shadow-lg">
<h1 class="text-xl font-bold">Información del usuario</h1>
<p class="text-blue-200 text-sm">CuidaVida</p>
</div>

<!-- CARD -->
<div class="bg-white p-5 rounded-b-2xl shadow-lg">

<!-- PROGRESS -->
<div class="flex gap-2 mb-5">
<div class="h-2 flex-1 bg-blue-500 rounded progress"></div>
<div class="h-2 flex-1 bg-gray-200 rounded progress"></div>
<div class="h-2 flex-1 bg-gray-200 rounded progress"></div>
<div class="h-2 flex-1 bg-gray-200 rounded progress"></div>
</div>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

<!-- PASO 1 -->
<div class="step active slide-up">
<h2 class="font-semibold text-gray-700 mb-3">Información General</h2>

<!-- FOTO -->
<div class="flex flex-col items-center mb-4">
<img id="preview" src="https://via.placeholder.com/100"
class="w-24 h-24 rounded-full object-cover border-4 border-blue-500 mb-2">

<input type="file" name="foto" accept="image/*" onchange="previewImage(event)" class="text-sm">
</div>

<input name="nombre" class="w-full p-3 border rounded-xl mb-3" placeholder="Nombre completo">

<input edad="edad" type="number" class="w-full p-3 border rounded-xl mb-3" placeholder="Edad">

<select name="sexo" class="w-full p-3 border rounded-xl mb-3">
<option>Selecciona sexo</option>
<option>Masculino</option>
<option>Femenino</option>
<option>Otro</option>
</select>

<select tipo_sangre ="tipo_sangre" class="w-full p-3 border rounded-xl">
<option>Tipo de sangre</option>
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>B+</option>
</select>

request.session["edad"] = edad
request.session["tipo_sangre"] = tipo_sangre

</div>

<!-- PASO 2 -->
<div class="step slide-up">
<h2 class="font-semibold text-gray-700 mb-3">Enfermedades</h2>

<p class="text-sm text-gray-500 mb-2">Selecciona las enfermedades:</p>

<div class="grid grid-cols-2 gap-2 mb-4 text-sm">

<label><input type="checkbox" name="enfermedades" value="diabetes"> Diabetes</label>
<label><input type="checkbox" name="enfermedades" value="hipertension"> Hipertensión</label>
<label><input type="checkbox" name="enfermedades" value="asma"> Asma</label>
<label><input type="checkbox" name="enfermedades" value="renal"> Enfermedad renal</label>
<label><input type="checkbox" name="enfermedades" value="cardiacos"> Problemas cardíacos</label>
<label><input type="checkbox" id="ninguna"> Ninguna</label>

</div>

<textarea name="antecedentes" class="w-full p-3 border rounded-xl mb-3" placeholder="Antecedentes médicos"></textarea>

<textarea name="medicamentos" class="w-full p-3 border rounded-xl" placeholder="Medicamentos actuales"></textarea>

</div>

<!-- PASO 3 -->
<div class="step slide-up">
<h2 class="font-semibold text-gray-700 mb-3">Contacto</h2>

<input name="telefono" class="w-full p-3 border rounded-xl mb-3" placeholder="Teléfono">

<input name="correo" type="email" class="w-full p-3 border rounded-xl mb-3" placeholder="Correo">

<select name="estado" class="w-full p-3 border rounded-xl mb-3">
<option>Estado</option>
<option>Michoacán</option>
<option>CDMX</option>
<option>Jalisco</option>
</select>

<input name="direccion" class="w-full p-3 border rounded-xl" placeholder="Dirección">

</div>

<!-- PASO 4 -->
<div class="step slide-up">
<h2 class="font-semibold text-gray-700 mb-3">Doctor / Institución</h2>

<input name="doctor" class="w-full p-3 border rounded-xl mb-3" placeholder="Nombre del doctor">

<input name="hospital" class="w-full p-3 border rounded-xl mb-3" placeholder="Hospital o clínica">

<input name="seguro" class="w-full p-3 border rounded-xl" placeholder="Número de seguro">

<p class="text-sm text-gray-500 mt-3">Verifica la información antes de guardar.</p>
</div>

<!-- BOTONES -->
<div class="flex justify-between mt-6">

<button type="button" id="prev"
class="bg-gray-200 text-gray-700 px-4 py-2 rounded-xl">
Anterior
</button>

<button type="button" id="next"
class="bg-blue-600 text-white px-5 py-2 rounded-xl shadow hover:bg-blue-700">
Siguiente
</button>

</div>

</form>

</div>
</div>

<script>

// WIZARD
let currentStep = 0;
const steps = document.querySelectorAll(".step");
const progress = document.querySelectorAll(".progress");

function updateUI() {
steps.forEach((step, i) => {
step.classList.toggle("active", i === currentStep);
});

progress.forEach((bar, i) => {
bar.classList.toggle("bg-blue-500", i <= currentStep);
bar.classList.toggle("bg-gray-200", i > currentStep);
});
}

document.getElementById("next").onclick = () => {
if(currentStep < steps.length - 1){
currentStep++;
updateUI();
}else{
document.querySelector("form").submit();
}
};

document.getElementById("prev").onclick = () => {
if(currentStep > 0){
currentStep--;
updateUI();
}
};

// FOTO PREVIEW
function previewImage(event){
const reader = new FileReader();
reader.onload = function(){
document.getElementById('preview').src = reader.result;
};
reader.readAsDataURL(event.target.files[0]);
}

// CHECKBOX "NINGUNA"
const ninguna = document.getElementById("ninguna");
const checks = document.querySelectorAll("input[name='enfermedades']");

ninguna.addEventListener("change", () => {
checks.forEach(c => c.checked = false);
});

checks.forEach(c => {
c.addEventListener("change", () => {
ninguna.checked = false;
});
});

</script>

</body>
</html>
